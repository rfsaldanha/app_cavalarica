<!DOCTYPE html>
<html>
<head>
	
	<title>Rio de Janeiro - RJ</title>

	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<link rel="shortcut icon" type="image/x-icon" href="docs/images/favicon.ico" />

    <link rel="stylesheet" href="leaflet/leaflet.css"/>
    <script src="leaflet/leaflet.js"></script>
    <script src="js/leaflet-providers.js"></script>


	<style>
		html, body {
			height: 100%;
			margin: 0;
		}
		#map {
			width: 600px;
			height: 400px;
		}
	</style>

	<style>
		body { padding: 0; margin: 0; } #map { height: 100%; width: 100vw; }
		.info { padding: 6px 8px; font: 14px/16px Arial, Helvetica, sans-serif; background: white; background: rgba(255,255,255,0.8); box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px; } .info h4 { margin: 0 0 5px; color: #777; }
		.legend { text-align: left; line-height: 18px; color: #555; } .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.7; }
	</style>
</head>
<body>

<div id='map'></div>

<script type="text/javascript" src="data/us-states.js"></script>

<script type="text/javascript">

  // Lembrete do link de dev
  // https://rfsaldanha.github.io/app_cavalarica/

	// get color depending on population density value
	function getColor(d) {
		return d > 1000 ? '#800026' :
				d > 500  ? '#BD0026' :
				d > 200  ? '#E31A1C' :
				d > 100  ? '#FC4E2A' :
				d > 50   ? '#FD8D3C' :
				d > 20   ? '#FEB24C' :
				d > 10   ? '#FED976' :
							'#FFEDA0';
	}

	function style(feature) {
		return {
			weight: 2,
			opacity: 1,
			color: 'white',
			dashArray: '3',
			fillOpacity: 0.7,
			fillColor: getColor(feature.properties.density)
		};
	}

	function highlightFeature(e) {
		// Reset style on entire layer
		geojson.resetStyle();
		info.update();
		
		var layer = e.target;

		layer.setStyle({
			weight: 5,
			color: '#666',
			dashArray: '',
			fillOpacity: 0.7
		});

		if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
			layer.bringToFront();
		}

		info.update(layer.feature.properties);
	}

	function onEachFeature(feature, layer) {
		layer.on({
			click: highlightFeature
		});
	}
	
	// Mapas base
	var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
	var aquarela = L.tileLayer.provider('Stamen.Watercolor');
	var satelite = L.tileLayer.provider('Esri.WorldImagery');
	var luzes_noturnas = L.tileLayer.provider('NASAGIBS.ViirsEarthAtNight2012');
	var relevo = L.tileLayer.provider('Esri.WorldPhysical');

  // Camada
	var geojson = L.geoJson(statesData, {
		style: style,
		onEachFeature: onEachFeature
	});
  
  // Cria mapa
	var map = L.map('map', {
		center: [37.8, -96],
		zoom: 4,
		layers: [osm, geojson]
	});

  // Lista de camadas base e camadas gerais
	var baseLayers = {
		"Ruas": osm,
		"Aquarela": aquarela,
		"Imagem de satélite": satelite,
		"Luzes noturnas": luzes_noturnas,
		"Relevo": relevo
	};
	var overlays = {
		"Bairros": geojson
	};

  // Adiciona controle de camadas ao mapa
	L.control.layers(baseLayers, overlays, {position: 'topleft'}).addTo(map);

	// control that shows state info on hover
	var info = L.control();

	info.onAdd = function (map) {
		this._div = L.DomUtil.create('div', 'info');
		this.update();
		return this._div;
	};

	info.update = function (props) {
		this._div.innerHTML = '<h4>Rio de Janeiro - RJ</h4>' +  (props ?
			'<b>' + props.name + '</b><br />' + props.density + ' people / mi<sup>2</sup>'
			: 'Clique em um dos bairros');
	};

	info.addTo(map);	

  // Cria legenda
	var legend = L.control({position: 'bottomright'});
	
	legend.onAdd = function (map) {

		var div = L.DomUtil.create('div', 'info legend'),
			grades = [0, 10, 20, 50, 100, 200, 500, 1000],
			labels = [],
			from, to;

		for (var i = 0; i < grades.length; i++) {
			from = grades[i];
			to = grades[i + 1];

			labels.push(
				'<i style="background:' + getColor(from + 1) + '"></i> ' +
				from + (to ? '&ndash;' + to : '+'));
		}

		div.innerHTML = labels.join('<br>');
		return div;
	};

	legend.addTo(map);
</script>



</body>
</html>
